version: '3.8'

services:
  zookeeper:
    image: wurstmeister/zookeeper
    ports:
      - "2181:2181"
    networks:
      - app-network    

  kafka:
    image: wurstmeister/kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_CREATE_TOPICS: "events:1:1"
      KAFKA_LISTENERS: INSIDE://:29092,OUTSIDE://:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INSIDE
      KAFKA_ADVERTISED_LISTENERS: INSIDE://kafka:29092,OUTSIDE://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INSIDE:PLAINTEXT,OUTSIDE:PLAINTEXT
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
    depends_on:
      - zookeeper
    networks:
      - app-network    

  db:
    image: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: events
    ports:
      - "3306:3306"
    networks:
      - app-network    

  receiver-service:
    build: ./receiver
    ports:
      - "8080:8080"
    volumes:
      - ./receiver:/app
    depends_on:
      - kafka
    networks:
      - app-network    

  analyzer-service:
    build: ./analyzer
    ports:
      - "5005:5005"
    volumes:
      - ./analyzer:/app
    depends_on:
      - kafka
    networks:
      - app-network    

networks:
  app-network:
    driver: bridge
